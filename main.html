<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doug Hepburn Program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0b;
      --surface: #151515;
      --surface2: #1c1c1c;
      --border: #272727;
      --border2: #333;
      --accent: #E8A020;
      --accent-dim: rgba(232,160,32,0.10);
      --accent-dim2: rgba(232,160,32,0.06);
      --text: #F0F0F0;
      --muted: #7a7a7a;
      --muted2: #ABABAB;
      --green: #3ECF6E;
      --red: #E05050;
      --pb: #38BDF8;
      --pb-dim: rgba(56,189,248,0.08);
      --pb-dim2: rgba(56,189,248,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    header {
      padding: 28px 40px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .logo-top {
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
    }
    .logo-name {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--text);
      line-height: 0.9;
    }
    .logo-sub {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 4px;
    }

    .header-right { text-align: right; }
    .date-day {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 2px;
    }
    .date-full {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .date-status {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .date-status.workout { color: var(--green); }
    .date-status.rest { color: var(--muted); }

    /* ─── MAIN ─── */
    main { padding: 32px 40px; max-width: 1400px; }

    /* ─── STATUS SCREENS ─── */
    .status-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    .status-screen .giant {
      font-size: clamp(80px, 15vw, 160px);
      font-weight: 900;
      letter-spacing: -6px;
      line-height: 1;
      color: var(--surface2);
      margin-bottom: 16px;
    }
    .status-screen .sub {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }
    .status-screen .next-workout {
      margin-top: 32px;
      padding: 20px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      text-align: left;
    }
    .status-screen .next-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 8px;
    }
    .status-screen .next-info {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .status-screen .next-detail {
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      margin-top: 4px;
    }

    /* ─── WORKOUT GRID ─── */
    .workout-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    /* ─── WORKOUT CARD ─── */
    .workout-card {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }
    .workout-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
    }

    .card-header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .card-lift {
      display: flex;
      flex-direction: column;
    }
    .card-lift-abbr {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .card-lift-name {
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text);
    }
    .card-right {
      text-align: right;
    }
    .card-scheme-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .card-weight {
      font-size: 36px;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      line-height: 1;
    }
    .card-weight-unit {
      font-size: 14px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Scheme progress pills */
    .scheme-track {
      padding: 10px 24px 12px;
      display: flex;
      align-items: center;
      gap: 3px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .scheme-track-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      margin-right: 6px;
      min-width: 44px;
    }
    .scheme-pill {
      flex: 1;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      color: var(--muted);
      background: var(--bg);
      transition: all 0.2s;
      letter-spacing: 0;
    }
    .scheme-pill.past {
      background: var(--border2);
      color: var(--muted2);
    }
    .scheme-pill.current {
      background: var(--accent);
      color: #000;
    }

    /* ─── SETS TABLE ─── */
    .section-header {
      padding: 10px 24px 6px;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      border-top: 1px solid var(--border);
    }

    .sets-table {
      width: 100%;
      border-collapse: collapse;
    }
    .sets-table thead th {
      padding: 5px 24px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 400;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .sets-table thead th:nth-child(2) { text-align: right; width: 110px; }
    .sets-table thead th:last-child { text-align: right; width: 60px; }
    .sets-table td {
      padding: 7px 24px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .sets-table td:nth-child(2) { text-align: right; width: 110px; }
    .sets-table td:last-child { text-align: right; width: 60px; }

    .sets-table tr.wu td { color: var(--muted); font-size: 12px; }
    .sets-table tr.wu .ww { color: var(--muted2); font-weight: 400; font-size: 16px; }
    .sets-table tr.wu .rr { color: var(--muted2); font-size: 16px; }

    .sets-table tr.wo td:first-child { color: var(--muted2); font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
    .sets-table tr.wo .w { color: var(--accent); font-weight: 800; font-size: 20px; }
    .sets-table tr.wo .r { color: var(--green); font-weight: 800; font-size: 20px; }
    .sets-table tr.wo td:first-child span { font-size: 9px; letter-spacing: 1px; }

    /* WU section */
    .wu-header {
      padding: 10px 24px 6px;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      border-top: 1px solid var(--border);
    }

    /* PB section */
    .pb-header {
      padding: 10px 24px 6px;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--pb);
      font-family: 'IBM Plex Mono', monospace;
      border-top: 2px solid var(--pb);
      background: var(--pb-dim2);
    }
    .sets-table tr.pb {
      background: var(--pb-dim2);
    }
    .sets-table tr.pb td:first-child { color: var(--pb); font-size: 12px; }
    .sets-table tr.pb .w { color: var(--pb); font-weight: 600; font-size: 16px; }
    .sets-table tr.pb .r { color: var(--pb); font-weight: 600; font-size: 16px; }
    .sets-table tr.pb td { border-bottom: 1px solid rgba(56,189,248,0.08); }

    /* ─── PROGRESS BAR ─── */
    .progress-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
      margin-top: 0;
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .progress-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }
    .progress-count {
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted2);
    }
    .progress-count strong { color: var(--accent); }
    .progress-bar-wrap {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #F5C842);
      border-radius: 2px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }

    /* ─── CYCLE OVERVIEW STRIP ─── */
    .cycle-strip {
      display: flex;
      gap: 2px;
      margin-top: 10px;
    }
    .cycle-block {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 1px;
    }
    .cycle-block.done { background: var(--border2); }
    .cycle-block.current { background: var(--accent); }

    /* ─── FOOTER ─── */
    footer {
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0;
    }
    footer .foot-left {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }
    footer .foot-right {
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
    }


    /* ─── VOLUME TOTAL ─── */
    .volume-total {
      padding: 12px 24px 14px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 2px solid var(--border2);
      background: var(--surface2);
    }
    .volume-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted2);
    }
    .volume-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .volume-value .unit {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted2);
      margin-left: 2px;
    }
    /* ─── RESPONSIVE ─── */

    body.light {
      --bg: #F5F4F0;
      --surface: #FFFFFF;
      --surface2: #EEEDE9;
      --border: #DDDBD4;
      --border2: #C8C5BC;
      --accent: #C47F0A;
      --accent-dim: rgba(196,127,10,0.12);
      --accent-dim2: rgba(196,127,10,0.07);
      --text: #0D0D0D;
      --muted: #6B6A63;
      --muted2: #3D3C38;
      --green: #1E9E4E;
      --red: #C03A3A;
      --pb: #0284C7;
      --pb-dim: rgba(2,132,199,0.10);
      --pb-dim2: rgba(2,132,199,0.06);
    }

    /* ─── THEME TOGGLE ─── */
    #themeBtn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #themeBtn:hover {
      background: var(--border);
      color: var(--text);
      border-color: var(--accent);
    }
    #themeBtn .icon { font-size: 14px; }

    @media (max-width: 860px) {
      header { flex-direction: column; align-items: flex-start; padding: 20px 20px 16px; }
      .header-right { text-align: left; }
      .logo-name { font-size: 40px; }
      main { padding: 20px 20px; }
      .workout-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 4px; align-items: flex-start; padding: 16px 20px; }
    }
  </style>
</head>

// ─── BUILD LOOKUP ─────────────────────────────────────────────────────────────

const SCHEDULE = {};
[...SQ_SESSIONS, ...DL_SESSIONS].forEach(s => {
  const d = new Date(s[0]);
  const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  SCHEDULE[key] = { lift1:s[1], wt1:s[2], lift2:s[3], wt2:s[4], scheme:s[5], pb:s[6] };
});

// ─── HELPERS ─────────────────────────────────────────────────────────────────

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MON_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function dateKey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function fmtDate(d)  { return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; }

function totalSessions() { return SQ_SESSIONS.length + DL_SESSIONS.length; }
function completedSessions() {
  const now = new Date(); now.setHours(0,0,0,0);
  return [...SQ_SESSIONS, ...DL_SESSIONS].filter(s => new Date(s[0]) < now).length;
}

function findNextWorkout() {
  const today = new Date();
  for (let i = 1; i <= 10; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const s = SCHEDULE[dateKey(d)];
    if (s) return { date: d, session: s };
  }
  return null;
}

function currentCycleInfo(session) {
  // Determine which cycle number based on weight
  const cycleWeights = { SQ:[275,285,295,305,315,325,335,345,355,365,375,385], DL:[385,395,405,415,425,435,445,455,465,475,485,495] };
  const lift = session.lift1;
  const arr = lift === 'SQ' ? cycleWeights.SQ : cycleWeights.DL;
  const idx = arr.indexOf(session.wt1);
  return idx >= 0 ? idx + 1 : '?';
}

// ─── RENDER FUNCTIONS ─────────────────────────────────────────────────────────

function schemePills(current) {
  const keys = ['Z','A','B','C','D','E','F','G','H'];
  const idx = keys.indexOf(current);
  return keys.map((k,i) => {
    let cls = 'scheme-pill';
    if (i < idx) cls += ' past';
    if (i === idx) cls += ' current';
    return `<div class="${cls}">${k}</div>`;
  }).join('');
}

function buildLiftCard(lift, weight, scheme, pb) {
  const wu = WARMUPS[lift];
  const powerReps = REP_SCHEMES[scheme];
  const pbReps = PB_SCHEMES[pb];

  // Warmup rows
  const wuRows = wu.map((w,i) => `
    <tr class="wu">
      <td>Warm Up Set ${i+1}</td>
      <td><span class="ww">${w.toFixed(1)}</span></td>
      <td><span class="rr">${[5,5,5,3][i]}</span></td>
    </tr>`).join('');

  // Power set rows
  const woRows = powerReps.map((r,i) => `
    <tr class="wo">
      <td>Set ${i+1}</td>
      <td><span class="w">${weight.toFixed(1)}</span></td>
      <td><span class="r">${r}</span></td>
    </tr>`).join('');

  // PB weight = 80% of working weight, rounded to nearest 5
  const pbWeight = Math.round(weight * 0.8 / 5) * 5;

  // Total volume = warmup vol + working vol + PB vol
  const wuVol = wu.reduce((sum, w, i) => sum + w * [5,5,5,3][i], 0);
  const woVol = weight * powerReps.reduce((a,b) => a+b, 0);
  const pbVol = pbWeight * pbReps.reduce((a,b) => a+b, 0);
  const totalVol = (wuVol + woVol + pbVol).toLocaleString();

  // PB rows
  const pbRows = pbReps.map((r,i) => `
    <tr class="pb">
      <td>Powerbuilding Set ${i+1}</td>
      <td><span class="w">${pbWeight.toFixed(1)}</span></td>
      <td><span class="r">${r}</span></td>
    </tr>`).join('');

  return `
    <div class="workout-card">
      <div class="card-header">
        <div class="card-lift">
          <div class="card-lift-abbr">${lift}</div>
          <div class="card-lift-name">${LIFT_FULL[lift]}</div>
        </div>
        <div class="card-right">
          <div class="card-scheme-label">Scheme ${scheme} &nbsp;·&nbsp; PB ${pb}</div>
          <div class="card-weight">${weight.toFixed(1)}<span class="card-weight-unit"> lbs</span></div>
        </div>
      </div>
      <div class="scheme-track">
        <div class="scheme-track-label">Cycle</div>
        ${schemePills(scheme)}
      </div>
      <div class="wu-header">Warmup</div>
      <table class="sets-table">
        <thead><tr><th>Set</th><th>Weight</th><th>Reps</th></tr></thead>
        <tbody>${wuRows}</tbody>
      </table>
      <div class="section-header">Working Sets</div>
      <table class="sets-table">
        <thead><tr><th>Set</th><th>Weight</th><th>Reps</th></tr></thead>
        <tbody>${woRows}</tbody>
      </table>
      <div class="pb-header">Powerbuilding — ${pb}</div>
      <table class="sets-table">
        <thead><tr><th>Set</th><th>Weight</th><th>Reps</th></tr></thead>
        <tbody>${pbRows}</tbody>
      </table>
      <div class="volume-total">
        <div class="volume-label">Total Volume</div>
        <div class="volume-value">${totalVol}<span class="unit">lbs</span></div>
      </div>
    </div>`;
}

function buildProgressCard(completed, total, session) {
  const pct = (completed / total * 100).toFixed(1);
  const cycleNum = currentCycleInfo(session);
  const blocks = Array.from({length:12},(_,i) => {
    let cls = 'cycle-block';
    if (i < cycleNum - 1) cls += ' done';
    if (i === cycleNum - 1) cls += ' current';
    return `<div class="${cls}" title="Cycle ${i+1}"></div>`;
  }).join('');

  return `
    <div class="progress-card">
      <div class="progress-top">
        <div class="progress-title">Program Progress</div>
        <div class="progress-count"><strong>${completed}</strong> / ${total} sessions &nbsp;·&nbsp; <strong>${pct}%</strong> &nbsp;·&nbsp; Cycle <strong>${cycleNum}</strong> of 12</div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="cycle-strip">${blocks}</div>
    </div>`;
}


function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  const btn = document.getElementById('themeBtn');
  btn.innerHTML = isLight
    ? '<span class="icon">🌙</span> Dark'
    : '<span class="icon">☀️</span> Light';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

// Restore saved preference
(function() {
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeBtn');
      if (btn) btn.innerHTML = '<span class="icon">🌙</span> Dark';
    });
  }
})();

function render() {
  const now = new Date(); // PREVIEW DATE — change back to new Date() for live use
  const key = dateKey(now);
  const session = SCHEDULE[key];
  const programStart = new Date('5/4/2026');
  const programEnd   = new Date('5/14/2027');
  programEnd.setHours(23,59,59);

  // Header date
  document.getElementById('dayName').textContent = DAYS[now.getDay()];
  document.getElementById('dateStr').textContent  = fmtDate(now);

  const total = totalSessions();
  const completed = completedSessions();

  if (now < programStart) {
    document.getElementById('workoutStatus').className = 'date-status rest';
    document.getElementById('workoutStatus').textContent = 'Program not started';
    document.getElementById('footCycle').textContent = 'Starts May 4, 2026';
    document.getElementById('mainContent').innerHTML = `
      <div class="status-screen">
        <div class="giant">READY</div>
        <div class="sub">Program begins ${fmtDate(programStart)}</div>
      </div>`;
  } else if (now > programEnd) {
    document.getElementById('workoutStatus').className = 'date-status rest';
    document.getElementById('workoutStatus').textContent = 'Program complete';
    document.getElementById('footCycle').textContent = '12 / 12 Cycles Complete';
    document.getElementById('mainContent').innerHTML = `
      <div class="status-screen">
        <div class="giant">DONE</div>
        <div class="sub">12 cycles completed — program finished</div>
      </div>`;
  } else if (session) {
    // Workout day
    document.getElementById('workoutStatus').className = 'date-status workout';
    document.getElementById('workoutStatus').textContent = `Training Day — ${LIFT_FULL[session.lift1]} + ${LIFT_FULL[session.lift2]}`;

    const cycleNum = currentCycleInfo(session);
    document.getElementById('footCycle').textContent = `Cycle ${cycleNum} of 12 · Scheme ${session.scheme}`;

    document.getElementById('mainContent').innerHTML = `
      <div class="workout-grid">
        ${buildLiftCard(session.lift1, session.wt1, session.scheme, session.pb)}
        ${buildLiftCard(session.lift2, session.wt2, session.scheme, session.pb)}
      </div>
      ${buildProgressCard(completed, total, session)}`;
  } else {
    // Rest day
    document.getElementById('workoutStatus').className = 'date-status rest';
    document.getElementById('workoutStatus').textContent = 'Rest Day';

    const next = findNextWorkout();
    let nextHtml = '';
    if (next) {
      const ns = next.session;
      nextHtml = `
        <div class="next-workout">
          <div class="next-label">Next Workout</div>
          <div class="next-info">${DAYS[next.date.getDay()]} · ${MON_SHORT[next.date.getMonth()]} ${next.date.getDate()}</div>
          <div class="next-detail">${LIFT_FULL[ns.lift1]} ${ns.wt1} lbs &nbsp;+&nbsp; ${LIFT_FULL[ns.lift2]} ${ns.wt2} lbs &nbsp;·&nbsp; Scheme ${ns.scheme}</div>
        </div>`;
    }

    document.getElementById('footCycle').textContent = `${completed} / ${total} sessions complete`;

    // Still show a dummy session for the progress tracker — use last session
    const allSessions = [...SQ_SESSIONS, ...DL_SESSIONS];
    const lastPast = allSessions.filter(s => new Date(s[0]) <= now).pop();
    const dummySession = lastPast
      ? { lift1:lastPast[1], wt1:lastPast[2], lift2:lastPast[3], wt2:lastPast[4] }
      : { lift1:'SQ', wt1:275, lift2:'PR', wt2:140 };

    document.getElementById('mainContent').innerHTML = `
      <div class="status-screen">
        <div class="giant">REST</div>
        <div class="sub">Recovery &amp; adaptation</div>
        ${nextHtml}
      </div>
      ${buildProgressCard(completed, total, dummySession)}`;
  }
}

render();
